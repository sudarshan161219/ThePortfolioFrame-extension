<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Image</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #080a0f;
        --surface: #0e1118;
        --border: rgba(255, 255, 255, 0.06);
        --border-hover: rgba(255, 255, 255, 0.14);
        --accent: #c8ff00;
        --accent-dim: rgba(200, 255, 0, 0.08);
        --accent-mid: rgba(200, 255, 0, 0.15);
        --text: #f0f0f0;
        --muted: rgba(240, 240, 240, 0.35);
        --radius: 20px;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        overflow: hidden;
      }

      /* ── noise grain overlay ── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      /* ── ambient glow ── */
      body::after {
        content: "";
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(200, 255, 0, 0.055) 0%,
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 0;
      }

      .page {
        position: relative;
        z-index: 1;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        padding: 32px;
      }

      /* ── wordmark ── */
      .wordmark {
        font-size: 11px;
        font-family: "DM Mono", monospace;
        letter-spacing: 0.2em;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 40px;
        opacity: 0;
        animation: fadeUp 0.5s ease forwards;
      }

      .wordmark span {
        color: var(--accent);
      }

      /* ── drop zone ── */
      .dropzone {
        width: 100%;
        max-width: 480px;
        aspect-ratio: 4/3;
        border: 1.5px dashed var(--border-hover);
        border-radius: var(--radius);
        background: var(--surface);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        cursor: pointer;
        position: relative;
        transition:
          border-color 0.25s,
          background 0.25s,
          transform 0.25s;
        opacity: 0;
        animation: fadeUp 0.5s 0.1s ease forwards;
        overflow: hidden;
      }

      /* inner shimmer line */
      .dropzone::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(
          135deg,
          transparent 40%,
          rgba(200, 255, 0, 0.03) 100%
        );
        pointer-events: none;
      }

      .dropzone:hover,
      .dropzone.drag-over {
        border-color: var(--accent);
        background: var(--accent-dim);
        transform: scale(1.01);
      }

      .dropzone.drag-over {
        border-style: solid;
      }

      /* ── icon ring ── */
      .icon-ring {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 1.5px solid var(--border-hover);
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.03);
        transition:
          border-color 0.25s,
          background 0.25s;
        flex-shrink: 0;
      }

      .dropzone:hover .icon-ring,
      .dropzone.drag-over .icon-ring {
        border-color: var(--accent);
        background: var(--accent-mid);
      }

      .icon-ring svg {
        width: 26px;
        height: 26px;
        stroke: var(--muted);
        transition: stroke 0.25s;
      }

      .dropzone:hover .icon-ring svg,
      .dropzone.drag-over .icon-ring svg {
        stroke: var(--accent);
      }

      .drop-label {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      .drop-sub {
        font-size: 12px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        letter-spacing: 0.05em;
      }

      .or-row {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 80%;
      }
      .or-row::before,
      .or-row::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .or-row span {
        font-size: 10px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        letter-spacing: 0.15em;
      }

      .browse-btn {
        font-family: "Syne", sans-serif;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--accent);
        background: var(--accent-dim);
        border: 1px solid rgba(200, 255, 0, 0.2);
        border-radius: 100px;
        padding: 9px 22px;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s;
      }

      .browse-btn:hover {
        background: var(--accent-mid);
        border-color: rgba(200, 255, 0, 0.5);
      }

      input[type="file"] {
        display: none;
      }

      /* ── formats row ── */
      .formats {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 22px;
        opacity: 0;
        animation: fadeUp 0.5s 0.2s ease forwards;
      }

      .fmt-tag {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.1em;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 100px;
        padding: 4px 10px;
      }

      /* ── loading state ── */
      .loading-overlay {
        position: fixed;
        inset: 0;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 10;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }

      .loading-overlay.visible {
        opacity: 1;
        pointer-events: all;
      }

      .spinner {
        width: 36px;
        height: 36px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      .loading-text {
        font-size: 13px;
        font-family: "DM Mono", monospace;
        color: var(--muted);
        letter-spacing: 0.1em;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <p class="wordmark">
        The Portfolio <span>Frame</span> &nbsp;/&nbsp; upload
      </p>

      <div class="dropzone" id="dropzone">
        <div class="icon-ring">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M4 16l4-4 4 4 4-6 4 6" />
            <rect x="3" y="3" width="18" height="18" rx="3" />
          </svg>
        </div>
        <p class="drop-label">Drop your image here</p>
        <div class="or-row"><span>or</span></div>
        <label class="browse-btn" for="fileInput">Browse files</label>
        <p class="drop-sub">High-quality web formats</p>
        <input
          type="file"
          id="fileInput"
          accept="image/png, image/jpeg, image/webp, image/svg+xml"
        />
      </div>

      <div class="formats">
        <span class="fmt-tag">PNG</span>
        <span class="fmt-tag">JPG</span>
        <span class="fmt-tag">WEBP</span>
        <span class="fmt-tag">SVG</span>
      </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <p class="loading-text">Opening editor...</p>
    </div>

    <script src="/upload.js" type="module"></script>
  </body>
</html>
